name: Daily O&G Data Scraper Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configurar entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias de Extracción
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4
          
      - name: Ejecutar Scraper de Datos O&G
        run: |
          python scraper.py
          
      - name: Compilar y guardar base de datos PWA (data.js)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.js
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Auto-Update: Datos O&G actualizados" && git push)
